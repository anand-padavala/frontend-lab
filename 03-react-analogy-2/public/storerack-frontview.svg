<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="620" fill="#f0f0f0" rx="10"/>

  <!-- Title -->
  <rect x="200" y="10" width="500" height="40" fill="#333" rx="6"/>
  <text x="450" y="37" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">ELECTRONICS &amp; APPLIANCES — Store Rack</text>

  <!-- Rack shelf structure -->
  <rect x="30" y="55" width="840" height="555" fill="none" stroke="#999" stroke-width="3" rx="4"/>
  <!-- Vertical divider -->
  <line x1="460" y1="55" x2="460" y2="610" stroke="#999" stroke-width="3"/>
  <!-- Horizontal shelf line -->
  <line x1="30" y1="340" x2="460" y2="340" stroke="#999" stroke-width="2"/>

  <!-- Section Labels -->
  <rect x="160" y="62" width="180" height="28" fill="#1976d2" rx="4"/>
  <text x="250" y="82" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">TV RACK</text>
  <rect x="580" y="62" width="180" height="28" fill="#388e3c" rx="4"/>
  <text x="670" y="82" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">FRIDGE RACK</text>

  <!-- ==================== TV 1: Samsung 75" ==================== -->
  <g transform="translate(55, 100)">
    <!-- TV Frame -->
    <rect width="370" height="210" fill="#1a1a2e" rx="8" stroke="#333" stroke-width="2"/>
    <!-- Screen -->
    <rect x="15" y="15" width="340" height="140" fill="#0f3460" rx="4"/>
    <text x="185" y="85" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">Store Demo</text>
    <text x="185" y="110" text-anchor="middle" fill="#8bc6fc" font-size="12">STATE: channel = "Store Demo"</text>
    <!-- Size label on TV -->
    <text x="345" y="35" text-anchor="end" fill="#aaa" font-size="16" font-weight="bold">75"</text>

    <!-- Prop labels below TV -->
    <rect x="0" y="165" width="370" height="40" fill="#fff" rx="4" stroke="#ddd"/>
    <!-- Brand prop -->
    <rect x="10" y="172" width="160" height="26" fill="#e3f2fd" rx="3" stroke="#1976d2"/>
    <text x="18" y="190" fill="#1976d2" font-size="12" font-weight="bold">PROP: brand = "Samsung"</text>
    <!-- Size prop -->
    <rect x="180" y="172" width="180" height="26" fill="#e3f2fd" rx="3" stroke="#1976d2"/>
    <text x="188" y="190" fill="#1976d2" font-size="12" font-weight="bold">PROP: size = "75-inch"</text>
  </g>

  <!-- ==================== TV 2: LG 65" ==================== -->
  <g transform="translate(55, 350)">
    <!-- TV Frame -->
    <rect width="370" height="180" fill="#1a1a2e" rx="8" stroke="#333" stroke-width="2"/>
    <!-- Screen -->
    <rect x="15" y="15" width="340" height="110" fill="#0f3460" rx="4"/>
    <text x="185" y="72" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">Store Demo</text>
    <text x="185" y="95" text-anchor="middle" fill="#8bc6fc" font-size="12">STATE: channel = "Store Demo"</text>
    <!-- Size label on TV -->
    <text x="345" y="35" text-anchor="end" fill="#aaa" font-size="16" font-weight="bold">65"</text>

    <!-- Prop labels below TV -->
    <rect x="0" y="135" width="370" height="40" fill="#fff" rx="4" stroke="#ddd"/>
    <rect x="10" y="142" width="130" height="26" fill="#e3f2fd" rx="3" stroke="#1976d2"/>
    <text x="18" y="160" fill="#1976d2" font-size="12" font-weight="bold">PROP: brand = "LG"</text>
    <rect x="150" y="142" width="180" height="26" fill="#e3f2fd" rx="3" stroke="#1976d2"/>
    <text x="158" y="160" fill="#1976d2" font-size="12" font-weight="bold">PROP: size = "65-inch"</text>
  </g>

  <!-- ==================== Fridge 1: Whirlpool ==================== -->
  <g transform="translate(490, 100)">
    <!-- Fridge body -->
    <rect width="160" height="420" fill="#e0e0e0" rx="6" stroke="#999" stroke-width="2"/>
    <!-- Freezer door -->
    <rect x="8" y="8" width="144" height="120" fill="#fafafa" rx="4" stroke="#bbb"/>
    <text x="80" y="50" text-anchor="middle" fill="#666" font-size="11">Freezer</text>
    <!-- Handle -->
    <rect x="130" y="40" width="6" height="60" fill="#999" rx="2"/>
    <!-- Fridge door -->
    <rect x="8" y="136" width="144" height="220" fill="#fafafa" rx="4" stroke="#bbb"/>
    <!-- Handle -->
    <rect x="130" y="180" width="6" height="80" fill="#999" rx="2"/>

    <!-- State: Temperature display -->
    <rect x="20" y="170" width="100" height="45" fill="#e8f5e9" rx="4" stroke="#388e3c"/>
    <text x="70" y="188" text-anchor="middle" fill="#388e3c" font-size="10" font-weight="bold">STATE</text>
    <text x="70" y="206" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">37°F</text>

    <!-- State: Light indicator -->
    <rect x="20" y="225" width="100" height="30" fill="#fff9c4" rx="4" stroke="#f9a825"/>
    <text x="70" y="245" text-anchor="middle" fill="#333" font-size="10" font-weight="bold">STATE: light = OFF</text>

    <!-- Prop labels -->
    <rect x="0" y="365" width="160" height="50" fill="#fff" rx="4" stroke="#ddd"/>
    <rect x="8" y="372" width="144" height="16" fill="#e8f5e9" rx="3" stroke="#388e3c"/>
    <text x="14" y="384" fill="#388e3c" font-size="10" font-weight="bold">PROP: name = "Whirlpool 300L"</text>
    <rect x="8" y="392" width="144" height="16" fill="#e8f5e9" rx="3" stroke="#388e3c"/>
    <text x="14" y="404" fill="#388e3c" font-size="10" font-weight="bold">PROP: warranty = 3 Years</text>
  </g>

  <!-- ==================== Fridge 2: Samsung ==================== -->
  <g transform="translate(680, 100)">
    <!-- Fridge body -->
    <rect width="160" height="420" fill="#e0e0e0" rx="6" stroke="#999" stroke-width="2"/>
    <!-- Freezer door -->
    <rect x="8" y="8" width="144" height="120" fill="#fafafa" rx="4" stroke="#bbb"/>
    <text x="80" y="50" text-anchor="middle" fill="#666" font-size="11">Freezer</text>
    <rect x="130" y="40" width="6" height="60" fill="#999" rx="2"/>
    <!-- Fridge door -->
    <rect x="8" y="136" width="144" height="220" fill="#fafafa" rx="4" stroke="#bbb"/>
    <rect x="130" y="180" width="6" height="80" fill="#999" rx="2"/>

    <!-- State: Temperature display -->
    <rect x="20" y="170" width="100" height="45" fill="#e8f5e9" rx="4" stroke="#388e3c"/>
    <text x="70" y="188" text-anchor="middle" fill="#388e3c" font-size="10" font-weight="bold">STATE</text>
    <text x="70" y="206" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">37°F</text>

    <!-- State: Light indicator -->
    <rect x="20" y="225" width="100" height="30" fill="#fff9c4" rx="4" stroke="#f9a825"/>
    <text x="70" y="245" text-anchor="middle" fill="#333" font-size="10" font-weight="bold">STATE: light = OFF</text>

    <!-- Prop labels -->
    <rect x="0" y="365" width="160" height="50" fill="#fff" rx="4" stroke="#ddd"/>
    <rect x="8" y="372" width="144" height="16" fill="#e8f5e9" rx="3" stroke="#388e3c"/>
    <text x="14" y="384" fill="#388e3c" font-size="10" font-weight="bold">PROP: name = "Samsung 250L"</text>
    <rect x="8" y="392" width="144" height="16" fill="#e8f5e9" rx="3" stroke="#388e3c"/>
    <text x="14" y="404" fill="#388e3c" font-size="10" font-weight="bold">PROP: warranty = 5 Years</text>
  </g>

  <!-- ==================== Legend ==================== -->
  <g transform="translate(55, 560)">
    <rect x="0" y="0" width="16" height="16" fill="#e3f2fd" stroke="#1976d2" rx="2"/>
    <text x="22" y="13" fill="#333" font-size="12">PROPS — Fixed by parent, child cannot change</text>
    <rect x="350" y="0" width="16" height="16" fill="#e8f5e9" stroke="#388e3c" rx="2"/>
    <text x="372" y="13" fill="#333" font-size="12">STATE — Internal, managed by the component itself</text>
  </g>
</svg>
